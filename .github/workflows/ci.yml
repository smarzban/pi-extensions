name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify packages pack cleanly
        run: |
          set -e
          for pkg in packages/*/; do
            echo "==> $pkg"
            (cd "$pkg" && npm pack --dry-run)
          done
